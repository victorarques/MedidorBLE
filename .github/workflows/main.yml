name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instal·la Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip
          unzip -q gradle-8.7-bin.zip
          echo "$PWD/gradle-8.7/bin" >> $GITHUB_PATH

      - name: Compila APK
        run: gradle assembleDebug --project-dir MedidorBLE --no-daemon --refresh-dependencies

      - name: Puja APK
        uses: actions/upload-artifact@v4
        with:
          name: MedidorBLE-debug
          path: MedidorBLE/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
