name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instal·la Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Compila APK
        run: gradle assembleDebug --project-dir MedidorBLE

      - name: Puja APK
        uses: actions/upload-artifact@v4
        with:
          name: MedidorBLE-debug
          path: MedidorBLE/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
